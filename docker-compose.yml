version: '3.8'

services:
  # NGINX - LA ÚNICA PUERTA DE ENTRADA
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    networks:
      - biblioteca-net
    depends_on:
      - frontend
      - api-gateway

  # API GATEWAY
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    expose:
      - "3000"
    volumes:
      - ./logs:/app/logs
    networks:
      - biblioteca-net
    depends_on:
      - ms-libros
      - ms-autores
      - ms-usuarios

  # MS USUARIOS
  ms-usuarios:
    build: ./ms-usuarios
    container_name: ms-usuarios
    expose:
      - "8003"
    environment:
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASSWORD=admin
      - DB_NAME=biblioteca_relacional
      - JWT_SECRET=SECRET_KEY_PIOLIN
    networks:
      - biblioteca-net
    depends_on:
      - mysql-db

  # MS LIBROS (PHP)
  ms-libros:
    build: ./ms-libros
    container_name: ms-libros
    expose:
      - "80"
    volumes:
      - ./logs:/var/www/html/logs
      - ./ms-libros/uploads:/var/www/html/uploads
    networks:
      - biblioteca-net
    depends_on:
      - mysql-db

  # MS AUTORES
  ms-autores:
    build: ./ms-autores
    container_name: ms-autores
    expose:
      - "8002"
    networks:
      - biblioteca-net
    depends_on:
      - mongo-db

  # FRONTEND (React)
  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "3001"
    environment:
      - PORT=3001
    networks:
      - biblioteca-net

  # BASES DE DATOS (Mantenemos los puertos por si quieres usar Workbench/Compass)
  mysql-db:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: biblioteca_relacional
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - biblioteca-net

  mongo-db:
    image: mongo
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - biblioteca-net

networks:
  biblioteca-net:
    driver: bridge

volumes:
  mysql_data:
  mongo_data: